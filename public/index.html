<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HR Pro Bot Backend</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #111827;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 12px 40px rgba(17, 24, 39, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #eef2ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HR Pro Bot Backend</h1>
      <p>Service is deployed. Telegram webhook endpoint: <code>/api/webhook</code>.</p>
    </main>
  </body>
 </html>
